name: movil_makeup
description: A new Flutter project for GlamourML.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.1
  flutter_dotenv: ^5.1.0
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  supabase_flutter: ^2.6.0
  image_picker: ^1.0.7
  pdf: ^3.12.0
  share_plus: ^12.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_glamour.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/logo_glamour.png
